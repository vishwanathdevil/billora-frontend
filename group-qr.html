<!DOCTYPE html>
<html>
<head>
    <title>Billora - Group QR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<div class="app-container flex-center">
    <div class="glass-card text-center mt-2" style="width: 100%; max-width: 350px;">
        <h3 class="mb-2">Your Group Session</h3>
        <p style="font-size:13px;" class="mb-3">Ask your family members to select "I am a Child" and scan this QR code to join your cart.</p>
        
        <div id="sessionQrContainer" style="width: 200px; height: 200px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; display: flex; justify-content: center; align-items: center;"></div>
        
        <h4 class="mt-3" style="color:var(--accent-primary);">Session ID: <span id="sessionIdDisplay"></span></h4>
        
        <button class="btn btn-success mt-3" onclick="window.location.href='scanner.html'">
            <i data-lucide="scan-barcode"></i> Proceed to Scanner
        </button>
    </div>
</div>

<script>
    lucide.createIcons();
    
    const sessionId = localStorage.getItem("sessionId");
    if (!sessionId) window.location.href = "home.html";
    
    document.getElementById("sessionIdDisplay").innerText = sessionId;
    
    const qrContainer = document.getElementById("sessionQrContainer");
    QRCode.toCanvas(`SESSION:${sessionId}`, { width: 180 }, function (err, canvas) {
        if (!err) {
            qrContainer.appendChild(canvas);
        }
    });
</script>

<script src="js/app.js"></script>
</body>
</html>
