<!DOCTYPE html>
<html>
<head>
    <title>Billora - Group Shopping</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
    
    <!-- QR Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
</head>
<body>

<div class="app-container">

    <div class="app-header">
        <h2>👪 Group Shopping</h2>
        <button class="btn-icon" onclick="window.location.href='home.html'" title="Back">
            <i data-lucide="arrow-left"></i>
        </button>
    </div>

    <!-- INITIAL ROLE SELECTION -->
    <div id="roleSelection" class="glass-card mt-2">
        <h3 class="text-center mb-3">Who are you?</h3>
        <p class="text-center mb-3" style="font-size:14px;">Shop together with your family. The parent scans and pays, children can add items to the cart.</p>
        
        <button class="btn btn-primary mb-2" onclick="startAsParent()">
            <i data-lucide="user-check"></i> I am the Parent
        </button>
        
        <button class="btn btn-secondary" onclick="startAsChild()">
            <i data-lucide="users"></i> I am a Child (Join Group)
        </button>
    </div>

    <!-- CHILD SCANNER VIEW -->
    <div id="childView" class="glass-card mt-2" style="display: none; text-align: center;">
        <h3 class="mb-2">📷 Scan Parent's QR</h3>
        <p style="font-size:13px;" class="mb-2">Point your camera at the Parent's phone.</p>
        
        <div id="reader" style="width:100%; max-width:300px; margin:auto; border-radius:12px; overflow:hidden; border:2px solid var(--accent-primary);"></div>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
<script src="js/group-setup.js?v=4"></script>

</body>
</html>
