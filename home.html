<!DOCTYPE html>
<html>
<head>
    <title>Billora - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
</head>
<body>

<div class="app-container">

    <div class="app-header">
        <h2>👋 Welcome to Billora</h2>
        <button class="btn-icon" onclick="logout()" title="Logout">
            <i data-lucide="log-out"></i>
        </button>
    </div>

    <div class="grid-2 mt-2">
        <div class="glass-card text-center" style="cursor: pointer;" onclick="goToStore()">
            <div style="background: rgba(59, 130, 246, 0.1); width: 60px; height: 60px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                <i data-lucide="shopping-bag" style="color: var(--accent-primary); width: 30px; height: 30px;"></i>
            </div>
            <h3>Start Shopping</h3>
            <p style="font-size: 14px;">Scan & pay in store</p>
        </div>

        <div class="glass-card text-center" style="cursor: pointer;" onclick="goToBills()">
            <div style="background: rgba(139, 92, 246, 0.1); width: 60px; height: 60px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                <i data-lucide="receipt" style="color: var(--accent-secondary); width: 30px; height: 30px;"></i>
            </div>
            <h3>View Bills</h3>
            <p style="font-size: 14px;">Past purchases</p>
        </div>
    </div>

</div>

<script>
    lucide.createIcons();
</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>


<script>
function goToStore() {

    // 🟢 SOLO MODE
    localStorage.setItem("mode", "SOLO");

    // 🔥 HARD RESET
    localStorage.removeItem("sessionId");
    localStorage.removeItem("sessionCreator");
    localStorage.removeItem("role");

    window.location.href = "store.html";
}

function goToGroup() {

    // 🟡 GROUP MODE
    localStorage.setItem("mode", "GROUP");

    window.location.href = "group.html";
}
</script>

<script src="js/app.js"></script>

</body>
</html>
