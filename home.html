<!DOCTYPE html>
<html>
<head>
    <title>Billora - Home</title>
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/home.css">
</head>
<body>

<div class="container">

    <h2>👋 Welcome to Billora</h2>

    <div class="card">
        <button onclick="goToStore()">🛒 Start Shopping</button>
        <br><br>

        <button onclick="goToBills()">🧾 View Bills</button>
        <br><br>
    </div>

    <button onclick="logout()">Logout</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>


<script>
function goToStore() {

    // 🟢 SOLO MODE
    localStorage.setItem("mode", "SOLO");

    // 🔥 HARD RESET
    localStorage.removeItem("sessionId");
    localStorage.removeItem("sessionCreator");
    localStorage.removeItem("role");

    window.location.href = "store.html";
}

function goToGroup() {

    // 🟡 GROUP MODE
    localStorage.setItem("mode", "GROUP");

    window.location.href = "group.html";
}
</script>

<script src="js/app.js"></script>

</body>
</html>
