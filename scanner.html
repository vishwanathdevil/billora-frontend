<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Scan Product</h2>

<div class="container">

    <!-- CAMERA -->
    <div id="scanner"></div>

    <!-- PRODUCT INFO -->
    <h3 id="productName">Scan a product</h3>
    <p>Price: ₹ <span id="productPrice">0</span></p>

    <!-- BUTTONS (ALWAYS VISIBLE) -->
    <div id="actionButtons">
        <button onclick="addScannedToCart()">Add to Cart</button>
        <button onclick="restartScanner()">Scan Again</button>
        <button onclick="goToCart()">Go to Cart</button>
    </div>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="js/scanner.js"></script>

</body>
</html>
