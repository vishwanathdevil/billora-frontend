<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Scan Product</h2>

<div class="container">

    <!-- CAMERA -->
    <div id="scanner" style="width: 300px; height: 300px;"></div>

    <!-- PRODUCT INFO -->
    <h3 id="productName">Scan a product</h3>
    <p>Price: ₹ <span id="productPrice">0</span></p>

    <!-- BUTTONS (ALWAYS VISIBLE) -->
    <div id="actionButtons">
        <button onclick="addScannedToCart()">Add to Cart</button>
        <button onclick="restartScanner()">Scan Again</button>
        <button onclick="goToCart()">Go to Cart</button>
    </div>

</div>

<!-- <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script> -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="js/app.js"></script>

</body>
</html>
