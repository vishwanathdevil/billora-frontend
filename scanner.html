<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Scan Product</h2>

<div class="container">

    <!-- CAMERA -->
    <div id="scanner" style="width:300px;"></div>

    <br>

    <!-- PRODUCT BOX -->
    <div id="productBox" style="display:none; margin-top:20px;">

        <h3 id="productName"></h3>
        <p>Price: ₹ <span id="productPrice"></span></p>

        <div id="actionButtons" style="margin-top:10px;">
            <button onclick="addScannedToCart()">Add to Cart</button>
            <button onclick="restartScanner()">Scan Again</button>
            <button onclick="goToCart()">Go to Cart</button>
        </div>

    </div>

</div>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
