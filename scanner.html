<!DOCTYPE html>
<html>
<head>
  <title>Billora Scanner</title>

  <!-- Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #reader {
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Scan Product</h2>

<div id="reader"></div>
<p id="result"></p>

<script>
  function onScanSuccess(decodedText) {

    // Stop scanner after one scan (important fix)
    html5QrcodeScanner.clear();

    // Show scanned barcode
    document.getElementById("result").innerText = "Scanned: " + decodedText;

    // CALL YOUR BACKEND (THIS MATCHES YOUR PROJECT)
    fetch("http://localhost:8080/products/" + decodedText)
      .then(res => res.json())
      .then(data => {

        // DIRECTLY ADD TO CART (your flow)
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        cart.push({
          id: data.id,
          name: data.name,
          price: data.price,
          quantity: 1
        });

        localStorage.setItem("cart", JSON.stringify(cart));

        alert(data.name + " added to cart");

        // Redirect to cart page (your flow)
        window.location.href = "cart.html";
      })
      .catch(err => {
        console.error(err);
        alert("Product not found");
      });
  }

  function onScanFailure(error) {
    // ignore continuous scan errors
  }

  let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 },
    false
  );

  html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
