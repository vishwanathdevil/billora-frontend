<!DOCTYPE html>
<html>
<head>
  <title>Billora Scanner</title>

  <!-- Quagga -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #scanner {
      width: 320px;
      height: 240px;
      margin: auto;
      border: 2px solid black;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .product-box {
      margin-top: 20px;
    }

    .qty-box {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Scan Product</h2>

<div id="scanner"></div>

<div class="product-box">
  <p><b>Name:</b> <span id="productName">-</span></p>
  <p><b>Price:</b> ₹<span id="productPrice">-</span></p>
</div>

<div class="qty-box">
  <button onclick="decreaseQty()">-</button>
  <span id="quantity">1</span>
  <button onclick="increaseQty()">+</button>
</div>

<div class="controls">
  <button onclick="addScannedToCart()">Add to Cart</button>
  <button onclick="restartScanner()">Scan Again</button>
  <button onclick="goToCart()">Go to Cart</button>
</div>

<script src="scanner.js"></script>

</body>
</html>
