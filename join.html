<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joining Group</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
        }

        .loader {
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🛒 Joining Cart Group</h2>

    <div class="loader"></div>

    <p>Please wait...</p>
    <p class="status">Waiting for main user to start shopping ⏳</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("id");

// ❌ INVALID LINK
if (!sessionId) {
    alert("Invalid group link ❌");
    window.location.href = "index.html";
}

// ✅ SAVE SESSION
localStorage.setItem("sessionId", sessionId);

// ⏳ WAIT LOOP
function waitForStart() {

    fetch(`https://billora-backend-9kyk.onrender.com/api/session/${sessionId}`)
        .then(res => {
            if (!res.ok) throw new Error("Session not found");
            return res.json();
        })
        .then(data => {

            console.log("Session:", data);

            // ✅ START CONDITION
            if (data.status === "ACTIVE" && data.storeId) {

                localStorage.setItem("selectedStoreId", data.storeId);

                // 🚀 REDIRECT
                window.location.href = "scanner.html";
            } 
            else {
                // 🔁 KEEP WAITING
                setTimeout(waitForStart, 2000);
            }
        })
        .catch(err => {
            console.error(err);

            document.querySelector(".status").innerText = "Session not found ❌";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
        });
}

// 🚀 START WAITING
waitForStart();
</script>

</body>
</html>
