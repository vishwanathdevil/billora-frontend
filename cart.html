<!DOCTYPE html>
<html>
<head>
    <title>Billora - Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
</head>
<body>

<div class="app-container" style="padding-bottom: 100px;"> <!-- Padding for bottom bar -->

    <div class="app-header">
        <h2>🛒 Your Cart</h2>
        <button class="btn-icon" onclick="goBack()" title="Back">
            <i data-lucide="arrow-left"></i>
        </button>
    </div>

    <!-- CART LIST -->
    <div id="cartItems"></div>

    <!-- TOTAL CARD -->
    <div class="glass-card mt-3">
        <h3 style="margin: 0;" class="flex-between">
            <span>Total:</span>
            <span style="color: var(--accent-success);">₹ <span id="cartTotal">0</span></span>
        </h3>
    </div>

</div>

<!-- BOTTOM BAR -->
<div class="action-bar-bottom">
    <button class="btn btn-secondary" onclick="clearCart()" style="flex: 1;" title="Clear Cart">
        <i data-lucide="trash-2"></i>
    </button>
    
    <button class="btn btn-primary" onclick="goToScanner()" style="flex: 2;">
        <i data-lucide="scan-barcode"></i> Add
    </button>

    <button id="payBtn" class="btn btn-success" onclick="goToPayment()" style="flex: 3;">
        Pay <i data-lucide="arrow-right"></i>
    </button>
</div>

<script>
    lucide.createIcons();
</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="js/app.js"></script>
<script src="js/cart.js"></script>

</body>
</html>
