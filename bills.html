<!DOCTYPE html>
<html>
<head>
    <title>Bill</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/bills.css">
</head>

<body>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="container">
    <h2>🧾 Bill</h2>

    <p><b>User:</b> <span id="username"></span></p>

    <h3>Items:</h3>
    <ul id="items"></ul>

    <div class="total">
        Total: ₹<span id="total"></span>
    </div>
    <p><b>Status:</b> <span id="status"></span></p>

<button onclick="window.location.href='home.html'">⬅ Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const itemsList = document.getElementById("items");
const usernameEl = document.getElementById("username");
const totalEl = document.getElementById("total");
const statusEl = document.getElementById("status");

// 🔥 CASE 1: SINGLE BILL
if (id) {

    fetch(`https://billora-backend-9kyk.onrender.com/api/bills/id/${id}`)
        .then(res => res.json())
        .then(data => {

            usernameEl.innerText = data.username;
            totalEl.innerText = data.total;
            statusEl.innerText = data.status;

            itemsList.innerHTML = "";

            (data.items || []).forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                itemsList.appendChild(li);
            });

        })
        .catch(() => alert("Bill not found"));
}

// 🔥 CASE 2: ALL USER BILLS
else {

    fetch(`https://billora-backend-9kyk.onrender.com/api/bills/user/${user.username}`)
        .then(res => res.json())
        .then(data => {

            usernameEl.innerText = user.username;
            itemsList.innerHTML = "";

            let total = 0;

            if (!Array.isArray(data)) {
                console.error("Invalid response:", data);
                return;
            }

            data.forEach(bill => {

                total += bill.total;

                const li = document.createElement("li");
                li.innerText = `Bill #${bill.id} - ₹${bill.total}`;
                li.style.cursor = "pointer";

                li.onclick = () => {
                    window.location.href = `bills.html?id=${bill.id}`;
                };

                itemsList.appendChild(li);
            });

            totalEl.innerText = total;

        })
        .catch(err => console.error(err));
}
</script>

</body>
</html>
