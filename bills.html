<!DOCTYPE html>
<html>
<head>
    <title>Billora - Bill</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
</head>

<body>

<div class="app-container">

    <div class="app-header">
        <h2>🧾 Receipt</h2>
        <button class="btn-icon" onclick="goBack()" title="Back">
            <i data-lucide="arrow-left"></i>
        </button>
    </div>

    <div class="glass-card mt-2">
        <p class="flex-between mb-2" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
            <span style="color: var(--text-secondary);">User:</span> 
            <span id="username" style="font-weight: 600;"></span>
        </p>

        <h3 class="mb-2" style="font-size: 16px;">Purchased Items:</h3>
        <ul id="items" style="list-style: none; padding: 0; margin-bottom: 20px;"></ul>

        <div class="flex-between mt-3" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: var(--radius-sm);">
            <span style="font-weight: 700;">Total:</span>
            <span style="color: var(--accent-success); font-weight: 800; font-size: 20px;">₹<span id="total"></span></span>
        </div>

        <p class="flex-between mt-3">
            <span style="color: var(--text-secondary);">Status:</span>
            <span id="status" style="font-weight: 600; padding: 4px 12px; background: rgba(16, 185, 129, 0.1); color: var(--accent-success); border-radius: 20px;"></span>
        </p>
    </div>
</div>

<script>
    lucide.createIcons();
    
    function goBack() {
        window.location.href = "home.html";
    }
</script>

<!-- ✅ JS FILES -->
<script src="js/app.js?v=5"></script>
<script src="js/bills.js"></script>

</body>
</html>
