<!DOCTYPE html>
<html>
<head>
    <title>Bill</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/bills.css">
</head>

<body>

<div class="container">
    <h2>🧾 Bill</h2>

    <p><b>User:</b> <span id="username"></span></p>

    <h3>Items:</h3>
    <ul id="items"></ul>

    <div class="total">
        Total: ₹<span id="total"></span>
    </div>
    <p><b>Status:</b> <span id="status"></span></p>

<button onclick="window.location.href='home.html'">⬅ Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const itemsList = document.getElementById("items");
const usernameEl = document.getElementById("username");
const totalEl = document.getElementById("total");

// 🔥 CASE 1: VIEW SINGLE BILL
if (id) {

    fetch(`https://billora-backend-9kyk.onrender.com/api/bills/id/${id}`)
        .then(res => res.json())
        .then(data => {

            usernameEl.innerText = data.username;
            totalEl.innerText = data.total;

            itemsList.innerHTML = "";

            data.items.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                itemsList.appendChild(li);
            });

        })
        .catch(() => alert("Bill not found"));

}

// 🔥 CASE 2: SHOW ALL USER BILLS
else {

    fetch(`https://billora-backend-9kyk.onrender.com/api/bills/${user.username}`)
        .then(res => res.json())
        .then(data => {

            usernameEl.innerText = user.username;
            itemsList.innerHTML = "";

            let total = 0;

            data.forEach(bill => {

                total += bill.total;

                const li = document.createElement("li");
                li.innerText = `Bill #${bill.id} - ₹${bill.total}`;
                li.style.cursor = "pointer";

                // 👉 click to open bill
                li.onclick = () => {
                    window.location.href = `bills.html?id=${bill.id}`;
                };

                itemsList.appendChild(li);
            });

            totalEl.innerText = total;

        });
}
</script>

</body>
</html>
