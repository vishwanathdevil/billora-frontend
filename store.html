<!DOCTYPE html>
<html>
<head>
    <title>Select Store</title>
    <link rel="stylesheet" href="../billora-frontend/style/store.css">
</head>
<body>

    <h2>Select Store</h2>

    <div class="container">

        <!-- 🏬 Store Buttons -->
        <div id="storeList">
            <button onclick="selectStore('D-Mart')">D-Mart</button>
            <button onclick="selectStore('Reliance Smart')">Reliance Smart</button>
            <button onclick="selectStore('More')">More</button>
            <button onclick="selectStore('Spar')">Spar</button>
        </div>

        <br>

        <!-- 🛒 Trolley Section (hidden initially) -->
        <div id="trolleySection" style="display:none;">
            <input type="text" id="trolleyNumber" placeholder="Enter Trolley Number (optional)">
            <button onclick="startShopping()">Start Shopping</button>
        </div>

        <br>
        <button onclick="goHome()">Back</button>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
