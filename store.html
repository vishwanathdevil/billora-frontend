<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Billora | Select Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/store.css">
</head>
<body>

    <div class="main-layout">
        <header class="store-header">
            <button class="icon-btn" onclick="goHome()">
                <i data-lucide="chevron-left"></i>
            </button>
            <div class="header-text">
                <h1>Select Store</h1>
                <p>Find a Billora partner near you</p>
            </div>
            <div class="user-badge">
                <i data-lucide="map-pin"></i>
            </div>
        </header>

        <main class="content-area">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search for a store...">
            </div>

            <div id="storeList" class="store-grid">
                </div>

            <div id="trolleySection" class="trolley-slide-panel" style="display:none;">
                <div class="drag-handle"></div>
                <div class="panel-content">
                    <h3><i data-lucide="shopping-cart"></i> Finalize Trolley</h3>
                    <p>Enter the number found on your trolley handle.</p>
                    <input type="text" id="trolleyNumber" placeholder="Ex: TRL-204">
                    <button class="btn-grand" onclick="startShopping()">
                        Start Shopping <span>→</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
