<!DOCTYPE html>
<html>
<head>
    <title>Select Store</title>
    <link rel="stylesheet" href="./style/store.css">
</head>
<body>

    <h2>Select Store</h2>

    <div class="container">

        <!-- 🏬 Store Buttons -->
        <div id="storeList">
            <button onclick="selectStore(1)">Store 1</button>
            <button onclick="selectStore(2)">Store 2</button>
            <button onclick="selectStore(3)">Store 3</button>
            <button onclick="selectStore(4)">Store 4</button>
        </div>

        <br>

        <!-- 🛒 Trolley Section (hidden initially) -->
        <div id="trolleySection" style="display:none;">
            <input type="text" id="trolleyNumber" placeholder="Enter Trolley Number (optional)">
            <button onclick="startShopping()">Start Shopping</button>
        </div>

        <br>
        <button onclick="goHome()">Back</button>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
