<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billora | Select Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/store.css">
</head>
<body>

    <div class="page-container">
        <header class="store-header">
            <button class="icon-btn" onclick="goHome()">
                <i data-lucide="arrow-left"></i>
            </button>
            <div class="header-text">
                <h1>Select Store</h1>
                <p>Find a Billora partner near you</p>
            </div>
        </header>

        <main class="content-area">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" placeholder="Search for stores..." id="storeSearch">
            </div>

            <div id="storeList" class="store-grid">
                </div>

            <div id="trolleySection" class="trolley-panel" style="display:none;">
                <div class="drag-handle"></div>
                <h3>Enter Trolley Number</h3>
                <div class="input-wrapper">
                    <i data-lucide="shopping-cart"></i>
                    <input type="text" id="trolleyNumber" placeholder="e.g. T-102">
                </div>
                <button class="btn-grand" onclick="startShopping()">
                    Confirm & Start <span>→</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        // Initialize the icons after the page loads
        lucide.createIcons();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
