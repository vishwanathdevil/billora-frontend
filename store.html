<!DOCTYPE html>
<html>
<head>
    <title>Billora - Select Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
</head>
<body>

<div class="app-container">
    
    <div class="app-header">
        <h2>🏬 Select Store</h2>
        <button class="btn-icon" onclick="goHome()" title="Back">
            <i data-lucide="arrow-left"></i>
        </button>
    </div>

    <!-- 🏬 Store Buttons -->
    <div id="storeList" class="grid-2">
    </div>

    <!-- 🛒 Trolley Section (hidden initially) -->
    <div id="trolleySection" style="display:none;" class="mt-3">
        <div class="input-group">
            <i data-lucide="shopping-cart"></i>
            <input type="text" id="trolleyNumber" class="input-field" placeholder="Enter Trolley Number (optional)">
        </div>
        <button class="btn btn-primary" onclick="startShopping()">Start Shopping</button>
    </div>

</div>

<script>
    lucide.createIcons();
</script>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
