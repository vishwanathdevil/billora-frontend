<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Billora | Select Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/store.css">
</head>
<body>

    <div class="login-wrapper"> <div class="login-card"> <div class="logo-area">
                <div class="logo-icon" style="background: var(--accent);">
                    <i data-lucide="map-pin"></i>
                </div>
                <h1>Select Store</h1>
                <p class="subtitle">Where are you shopping today?</p>
            </div>

            <div id="storeList" class="store-grid">
                </div>

            <div id="trolleySection" style="display:none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1);">
                <div class="input-group">
                    <i data-lucide="shopping-cart"></i>
                    <input type="text" id="trolleyNumber" placeholder="Enter Trolley Number">
                </div>
                <button class="btn-primary" onclick="startShopping()">Start Shopping</button>
            </div>

            <button class="btn-secondary" onclick="goHome()" style="margin-top: 20px;">
                <i data-lucide="arrow-left" style="width: 16px; vertical-align: middle; margin-right: 5px;"></i> 
                Back
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
