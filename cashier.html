<!DOCTYPE html>
<html>
<head>
    <title>Billora - Cashier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style/global.css">

    <!-- ✅ WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <!-- ✅ FIXED QR LIBRARY (CORRECT VERSION) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
</head>
<body>

<div class="app-container">

    <div class="app-header">
        <h2>🧑‍💼 Cashier Terminal</h2>
        <button class="btn-icon" onclick="logout()" title="Logout">
            <i data-lucide="log-out"></i>
        </button>
    </div>

    <p id="cameraError" style="color: var(--accent-danger); text-align: center; font-weight: 600; background: rgba(239, 68, 68, 0.1); border-radius: var(--radius-sm); padding: 10px; display: none;"></p>

    <div id="ordersContainer" class="mt-2" style="display: flex; flex-direction: column; gap: 15px;"></div>

</div>

<script>
    lucide.createIcons();
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>

    <!-- ✅ IMPORTANT: LOAD AFTER LIBRARY -->
    <script src="js/cashier.js?v=3"></script>

</body>
</html>
