<!DOCTYPE html>
<html>
<head>
    <title>Group Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        .create {
            background: #28a745;
        }

        .scan {
            background: #007bff;
        }

        .back {
            background: #dc3545;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>👨‍👩‍👦 Group Cart</h2>

    <div class="card">

        <button class="create" onclick="createGroupSession()">
            ➕ Create Group
        </button>

        <button class="scan" onclick="scanGroup()">
            📷 Scan Group
        </button>

        <button class="back" onclick="goHome()">
            ⬅ Back
        </button>

    </div>

</div>

<!-- QR + Scanner libs -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- YOUR JS -->
<script src="js/app.js"></script>
<script src="js/group.js"></script>

</body>
</html>
