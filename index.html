<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Billora | Next-Gen Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/global.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="shopping-cart"></i>
                </div>
                <h1>Billora</h1>
                <p class="subtitle">Self-checkout made simple</p>
            </div>

            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="username" placeholder="Username">
            </div>

            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

            <button class="btn-primary" onclick="login()">Login to Store</button>
            <button class="btn-secondary" onclick="register()">Create Account</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // This triggers the Lucide icons to render
        lucide.createIcons();
    </script>
    <script src="js/app.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
