<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Billora | Next-Gen Shopping</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="./style/global.css">
</head>

<body>

    <!-- 🔥 FULL SCREEN LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Connecting to server...</p>
    </div>

    <div class="flex-center">
        <div class="glass-card text-center" style="max-width: 400px;">

            <div class="mb-3">
                <div style="background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); width: 64px; height: 64px; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                    <i data-lucide="shopping-cart" style="color: white; width: 32px; height: 32px;"></i>
                </div>
                <h1 style="background: linear-gradient(90deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Billora</h1>
                <p>Self-checkout made simple</p>
            </div>

            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="username" class="input-field" placeholder="Username">
            </div>

            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" class="input-field" placeholder="Password">
            </div>

            <button id="loginBtn" class="btn btn-primary mt-2" onclick="login()">
                <i data-lucide="log-in"></i> Login to shop
            </button>

            <button class="btn btn-secondary mt-2" onclick="window.location.href='register.html'">Register</button>

        </div>
    </div>

    <div id="toast"></div>

    <script>
        lucide.createIcons();
    </script>

    <!-- ❌ removed app.js -->
    <script src="js/index.js?v=2"></script>

</body>
</html>
